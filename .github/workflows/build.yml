name: Build McBopomofo for Linux Mint 22.3

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    # Linux Mint 22.3 基於 Ubuntu 24.04，所以使用此環境最為精準
    runs-on: ubuntu-24.04

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
        with:
          submodules: recursive # 確保連同子模組一起抓取

      - name: 安裝編譯依賴套件
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            fcitx5 \
            libfcitx5core-dev \
            libfcitx5config-dev \
            libfcitx5utils-dev \
            fcitx5-modules-dev \
            cmake \
            extra-cmake-modules \
            gettext \
            libfmt-dev \
            libicu-dev \
            libjson-c-dev \
            ninja-build

      - name: 配置 CMake
        # 使用 Ninja 加快編譯速度，並設定安裝路徑為 /usr
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release

      - name: 執行編譯
        run: cmake --build build

      - name: 準備安裝檔預覽 (Staging)
        # 模擬安裝到一個臨時目錄，以便打包成品
        run: |
          destdir=$(pwd)/install_dir
          DESTDIR="$destdir" cmake --install build
          
      - name: 上傳編譯成品 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: fcitx5-mcbopomofo-ubuntu24.04
          path: install_dir/
