name: Build McBopomofo (Docker Ubuntu 24.04)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用與 Linux Mint 22.x 核心相同的 Ubuntu 24.04 容器進行編譯
    container:
      image: ubuntu:24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies in Container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            cmake extra-cmake-modules gettext g++ ninja-build pkg-config \
            libfcitx5core-dev libfcitx5utils-dev libfcitx5config-dev \
            fcitx5-modules-dev libfmt-dev libgoogle-glog-dev \
            libutf8cpp-dev libjson-c-dev libsqlite3-dev

      - name: Configure and Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -G Ninja
          cmake --build build

      - name: Create Install Script and Package
        run: |
          mkdir -p output
          
          # 1. 複製編譯出的 .so 檔案
          find build -name "*.so" -exec cp {} output/ \;
          
          # 2. 複製資料夾 (如果有的話)
          if [ -d "data" ]; then cp -r data output/; fi
          
          # 3. 在 output 資料夾內直接產生 install.sh
          cat << 'EOF' > output/install.sh
#!/bin/bash
if [ "$EUID" -ne 0 ]; then
  echo "請使用 sudo 執行此腳本：sudo bash install.sh"
  exit 1
fi

echo "正在安裝小麥注音 Fcitx5 插件 (Linux Mint 22 / Ubuntu 24.04)..."

# 定義系統路徑
LIB_DIR="/usr/lib/x86_64-linux-gnu/fcitx5"
DATA_DIR="/usr/share/fcitx5/mcbopomofo"

mkdir -p "$LIB_DIR"
mkdir -p "$DATA_DIR"

# 安裝檔案
if [ -f "libmcbopomofo.so" ]; then
    cp libmcbopomofo.so "$LIB_DIR/"
    echo "成功：已安裝 libmcbopomofo.so"
else
    # 嘗試搜尋可能的檔案名稱（預防不同分支命名不同）
    SO_FILE=$(ls *.so | head -n 1)
    if [ -n "$SO_FILE" ]; then
        cp "$SO_FILE" "$LIB_DIR/"
        echo "成功：已安裝 $SO_FILE"
    else
        echo "錯誤：找不到任何 .so 檔案"
        exit 1
    fi
fi

if [ -d "data" ]; then
    cp -r data/* "$DATA_DIR/"
    echo "成功：已安裝資料檔至 $DATA_DIR"
fi

echo "------------------------------------------"
echo "安裝完成！"
echo "請重新啟動 Fcitx5 (指令: fcitx5 -rd)"
echo "然後在 Fcitx5 設定中新增『小麥注音』即可使用。"
echo "------------------------------------------"
EOF
          # 賦予腳本執行權限
          chmod +x output/install.sh

      - name: Upload Build Result
        uses: actions/upload-artifact@v4
        with:
          name: mcbopomofo-mint22-bundle
          path: output/
